<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Missing Person</title>

<style>
body{font-family:'Segoe UI';background:#FFFDF5;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:25px;border-radius:12px}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px;background:#D94F1E;color:#fff;border:none;border-radius:8px;width:100%}
.preview{width:100%;height:150px;object-fit:cover;display:none;margin-top:10px}
.msg{margin-top:10px;padding:10px;border-radius:6px;display:none}
.success{background:#d1fae5;color:#065f46}
.error{background:#fee2e2;color:#991b1b}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h2>🚨 Report Missing Person</h2>

<form id="form" enctype="multipart/form-data">

<div class="grid">
<input type="text" name="name" placeholder="Full Name" required>
<input type="number" name="age" placeholder="Age" required>
</div>

<input type="text" name="aadhar" placeholder="Aadhar Number" maxlength="12" required>

<div class="grid">
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>
<input type="text" name="height" placeholder="Height">
</div>

<input type="text" name="location" placeholder="Location" required>

<div class="grid">
<input type="text" name="village" placeholder="Village">
<input type="text" name="city" placeholder="City">
</div>

<div class="grid">
<input type="text" name="state" placeholder="State">
<input type="text" name="pincode" placeholder="Pincode">
</div>

<input type="text" name="nearby" placeholder="Nearby">

<input type="datetime-local" name="date">

<textarea name="details" placeholder="Details"></textarea>
<div>
  <input type="file" id="file" name="photo" accept="image/*">
  <img id="preview" class="preview">
</div>

<div class="grid">
<input type="text" name="phone" placeholder="Phone">
<input type="email" name="email" placeholder="Email">
</div>

<button class="btn">Submit</button>

<div id="msg" class="msg"></div>

</form>

</div>
</div>

<script>

const file = document.getElementById("file");
const preview = document.getElementById("preview");
const form = document.getElementById("form");
const msg = document.getElementById("msg");

// Preview image
file.onchange = e=>{
  const f = e.target.files[0];
  if(f){
    preview.src = URL.createObjectURL(f);
    preview.style.display="block";
  }
};

// Submit form
form.onsubmit = async (e)=>{
  e.preventDefault();

  const formData = new FormData(form);

  // Ensure photo goes
  if(file.files.length > 0){
    formData.set("photo", file.files[0]);
  }

  try{
    const res = await fetch("/api/report", {
      method:"POST",
      body: formData
    });

    const result = await res.json();

    if(res.ok){
      showMsg("Report submitted successfully","success");
      form.reset();
      preview.style.display="none";
    } else {
      showMsg(result.error || "Error","error");
    }

  } catch(e){
    showMsg("Server error","error");
  }
};

function showMsg(text,type){
  msg.style.display="block";
  msg.className="msg "+type;
  msg.innerText=text;
}

</script>

</body>
</html>
